apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: xiaohongshu-mcp-build
spec:
  params:
    - name: REPO_URL
      description: 代码仓库地址
      type: string
      default: "https://github.com/xuanyunhui/xiaohongshu-mcp.git"
    - name: GIT_REF
      description: Git 分支、Tag 或提交哈希
      type: string
      default: "feature/base64-image-upload"
    - name: IMAGE
      description: 构建产物镜像地址（含tag）
      type: string
  workspaces:
    - name: shared-workspace
  tasks:
    - name: build-and-push
      taskSpec:
        params:
          - name: REPO_URL
            type: string
          - name: GIT_REF
            type: string
          - name: IMAGE
            type: string
        workspaces:
          - name: source
        steps:
          # 将 Containerfile 写入 workspace
          - name: write-containerfile
            image: registry.fedoraproject.org/fedora:44
            script: |
              cat > $(workspaces.source.path)/Containerfile <<'EOF'
              FROM registry.fedoraproject.org/fedora:44 AS builder
              RUN dnf install -y golang git && dnf clean all
              WORKDIR /opt/app-root/src
              RUN git clone --branch $(params.GIT_REF) --single-branch $(params.REPO_URL) .
              RUN go mod download
              RUN CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" .
              FROM registry.fedoraproject.org/fedora:44
              ENV TZ=Asia/Shanghai
              RUN ln -snf /usr/share/zoneinfo/$TZ /etc/localtime && echo $TZ > /etc/timezone
              WORKDIR /opt/app-root/src
              RUN dnf install -y --setopt=install_weak_deps=False chromium chromium-headless liberation-fonts alsa-lib at-spi2-atk atk cairo cups-libs dbus-libs expat fontconfig libgbm glib2 gtk3 nspr nss pango libX11 libX11-xcb libxcb libXcomposite libXcursor libXdamage libXext libXfixes libXi libXrandr libXrender libXScrnSaver libXtst wget xdg-utils && dnf clean all
              COPY --from=builder /opt/app-root/src/xiaohongshu-mcp .
              RUN mkdir -p /opt/app-root/src/images && chmod 777 /opt/app-root/src/images
              ENV HOME=/opt/app-root/src
              RUN chmod -R g+rwX /opt/app-root/src
              ENV ROD_BROWSER_BIN=/usr/bin/chromium-browser
              EXPOSE 18060
              CMD ["./xiaohongshu-mcp"]
              EOF
          # 使用 buildah 构建并推送镜像
          - name: build
            image: registry.redhat.io/rhel9/buildah@sha256:4e604d18fc609d25b2fc99814281944acaac78e8cd5e47b8359709b8b505db86
            script: |
              buildah bud \
                --storage-driver=vfs \
                --format oci \
                --layers \
                -t $(params.IMAGE) \
                -f $(workspaces.source.path)/Containerfile \
                $(workspaces.source.path)

              buildah push \
                --storage-driver=vfs \
                $(params.IMAGE) \
                docker://$(params.IMAGE)
            securityContext:
              capabilities:
                add:
                  - SETFCAP
            volumeMounts:
              - name: varlibcontainers
                mountPath: /var/lib/containers
        volumes:
          - name: varlibcontainers
            emptyDir: {}
      params:
        - name: REPO_URL
          value: $(params.REPO_URL)
        - name: GIT_REF
          value: $(params.GIT_REF)
        - name: IMAGE
          value: $(params.IMAGE)
      workspaces:
        - name: source
          workspace: shared-workspace
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: xiaohongshu-mcp-build-run-
spec:
  pipelineRef:
    name: xiaohongshu-mcp-build
  params:
    - name: REPO_URL
      value: "https://github.com/xuanyunhui/xiaohongshu-mcp.git"
    - name: GIT_REF
      value: "feature/base64-image-upload"
    - name: IMAGE
      value: "image-registry.openshift-image-registry.svc:5000/mcp-servers/xiaohongshu-mcp:latest"
  workspaces:
    - name: shared-workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi
