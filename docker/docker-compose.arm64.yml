services:
  xiaohongshu-mcp:
    build:
      context: ..
      dockerfile: Dockerfile.arm64
    container_name: xiaohongshu-mcp
    restart: unless-stopped
    init: true
    tty: true
    volumes:
      - ./data:/app/data
      - ./images:/app/images
    environment:
      - ROD_BROWSER_BIN=/ms-playwright/chromium-1155/chrome-linux/chrome
      - COOKIES_PATH=/app/data/cookies.json
    ports:
      - "18060:18060"
