<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>账号管理 · 小红书 MCP</title><link rel="stylesheet" href="/static/app.css"><script defer src="/static/app.js"></script><script defer src="/static/accounts.js"></script></head><body data-page="accounts"><header id="app-header"></header><main class="container"><div class="page-heading"><div><p class="eyebrow">ACCOUNTS</p><h1>账号管理</h1><p>隔离管理每个小红书账号的身份与登录状态。</p></div></div><section class="card"><h2>创建账号</h2><form id="create-account" class="form-grid"><label>账号 ID<input name="id" required pattern="[a-z][a-z0-9_]{2,31}" placeholder="acct_main"><small>小写字母开头，3–32 位</small></label><label>显示名称<input name="display_name" required placeholder="主账号"></label><label>负责人<input name="owner" placeholder="可选"></label><label>用途<input name="purpose" placeholder="例如：品牌内容"></label><button class="primary align-end" type="submit">创建账号</button></form></section><section class="card table-card"><div class="section-title"><h2>账号列表</h2><button id="refresh-accounts" class="ghost">刷新</button></div><div class="table-wrap"><table><thead><tr><th>账号</th><th>负责人</th><th>状态</th><th>默认</th><th>操作</th></tr></thead><tbody id="accounts-body"><tr><td colspan="5" class="empty">加载中…</td></tr></tbody></table></div></section></main><dialog id="qr-dialog"><div class="dialog-head"><h2>扫码登录</h2><button aria-label="关闭">×</button></div><img class="qr-image" alt="小红书登录二维码"><p class="qr-status"></p></dialog></body></html>
