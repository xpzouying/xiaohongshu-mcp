<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>账号管理 · 小红书 MCP</title><link rel="stylesheet" href="/static/app.css"><script defer src="/static/app.js"></script><script defer src="/static/mcp-contract.js"></script><script defer src="/static/accounts.js"></script></head><body data-page="accounts"><header id="app-header"></header><main class="container"><div class="page-heading"><div><p class="eyebrow">ACCOUNTS</p><h1>账号管理</h1><p>扫码添加小红书账号，自动获取昵称和登录状态。</p></div><button id="quick-add-btn" class="primary">＋ 扫码添加账号</button></div><details id="advanced-create" class="card"><summary><strong>高级创建账号</strong></summary><form id="create-account-form" class="filter-grid"><label>账号 ID<input name="account_id" required minlength="3" maxlength="32" pattern="[a-z][a-z0-9_]{2,31}" placeholder="例如 team_marketing"></label><label>显示名称<input name="display_name" required maxlength="100"></label><label>所有者<input name="owner" maxlength="100"></label><label>用途<input name="purpose" maxlength="200"></label><div class="dialog-actions"><button id="cancel-create" type="reset" class="ghost">取消</button><button type="submit" class="primary">创建账号</button></div></form></details><section class="card table-card"><div class="section-title"><h2>账号列表</h2><button id="refresh-accounts" class="ghost">刷新</button></div><div class="table-wrap"><table><thead><tr><th>账号</th><th>状态</th><th>默认</th><th>操作</th></tr></thead><tbody id="accounts-body"><tr><td colspan="4" class="empty">加载中…</td></tr></tbody></table></div></section></main><dialog id="qr-dialog"><div class="dialog-head"><h2>扫码登录</h2><button aria-label="关闭">×</button></div><img class="qr-image" alt="小红书登录二维码"><p class="qr-status"></p></dialog></body></html>
