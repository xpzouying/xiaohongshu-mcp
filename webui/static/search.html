<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>搜索浏览 · 小红书 MCP</title><link rel="stylesheet" href="/static/app.css"><script defer src="/static/app.js"></script><script defer src="/static/search.js"></script></head><body data-page="search"><header id="app-header"></header><main class="container"><div class="page-heading"><div><p class="eyebrow">DISCOVER</p><h1>搜索浏览</h1><p>从小红书内容中发现趋势、灵感和用户反馈。</p></div></div><form id="search-form" class="card search-panel"><div class="search-row"><label class="sr-only" for="keyword">搜索关键词</label><input id="keyword" name="keyword" required placeholder="输入关键词，例如：AI 工具"><button class="primary" type="submit">搜索</button></div><div class="filter-grid"><label>排序<select name="sort_by"><option>综合</option><option>最新</option><option>最多点赞</option><option>最多评论</option><option>最多收藏</option></select></label><label>笔记类型<select name="note_type"><option>不限</option><option>视频</option><option>图文</option></select></label><label>发布时间<select name="publish_time"><option>不限</option><option>一天内</option><option>一周内</option><option>半年内</option></select></label><label>搜索范围<select name="search_scope"><option>不限</option><option>已看过</option><option>未看过</option><option>已关注</option></select></label><label>位置<select name="location"><option>不限</option><option>同城</option><option>附近</option></select></label></div></form><div class="section-title"><h2>搜索结果</h2><span id="result-count" class="muted">等待搜索</span></div><section id="feed-grid" class="feed-grid"><div class="empty card">输入关键词开始搜索</div></section></main></body></html>
