<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>内容发布 · 小红书 MCP</title><link rel="stylesheet" href="/static/app.css"><script defer src="/static/app.js"></script><script defer src="/static/mcp-contract.js"></script><script defer src="/static/publish.js"></script></head><body data-page="publish"><header id="app-header"></header><main class="container narrow"><div class="page-heading"><div><p class="eyebrow">PUBLISH</p><h1>内容发布</h1><p>发布前请确认当前账号、素材路径与可见范围。</p></div></div><div class="segmented" role="tablist"><button type="button" data-mode="image">图文笔记</button><button type="button" data-mode="video">视频笔记</button></div><form id="publish-form" class="card publish-form"><label>标题 <span class="required">必填，最多 20 字</span><span class="character-count" id="title-count">0/20</span><input name="title" required maxlength="20"></label><label>正文 <span class="required">最多 1000 字</span><span class="character-count" id="content-count">0/1000</span><textarea name="content" maxlength="1000" rows="8"></textarea></label><label id="images-field">图片地址 <span class="required">每行一个，至少 1 张</span><textarea name="images" rows="4" placeholder="https://example.com/image.jpg&#10;/absolute/path/image.png"></textarea><small>HTTP(S) URL 和图片 data URL 可预览；服务端本地路径仅显示占位符。</small><div id="image-preview" class="image-preview" aria-live="polite"></div></label><label id="video-field">服务端本地视频绝对路径 <span class="required">必填</span><input name="video" placeholder="/absolute/path/video.mp4"><small>仅支持服务端可访问的本地路径；此处不是文件上传控件。</small><div id="video-preview" class="local-media-placeholder" hidden></div></label><div class="form-grid two"><label>标签<input name="tags" placeholder="AI工具, 效率"></label><label>商品关键词<input name="products" placeholder="可选，逗号分隔"></label><label>可见范围<select name="visibility"><option>公开可见</option><option>仅自己可见</option><option>仅互关好友可见</option></select></label><label>定时发布时间<input type="datetime-local" name="schedule_at"><small>留空立即发布；定时须在 1 小时至 14 天内</small></label></div><label class="check-row"><input type="checkbox" name="is_original"> 声明原创（仅图文）</label><button class="primary large" type="submit">确认发布</button></form></main></body></html>
