name: Build Check

on:
  push:
    branches: [ fixup ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: "1.24"
    - name: Tidy
      run: go mod tidy
    - name: Vet
      run: go vet ./...
    - name: Build
      run: go build -v -o xiaohongshu-mcp .
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: xiaohongshu-mcp
        path: xiaohongshu-mcp
