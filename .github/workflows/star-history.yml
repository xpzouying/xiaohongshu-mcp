name: Update star history chart

# 每周重新生成 README 的 Star History 图表。
# 背景：GitHub 2026-06-30 起限制 stargazers API，star-history.com 托管图表失效；
# 改用自研 star-history Action 在 CI 内用内置 GITHUB_TOKEN 生成（REST 403 自动回退 GraphQL）。
# main 有 require-PR 保护，图表发布到独立数据分支 star-history，README 引用其 raw URL。

on:
  schedule:
    - cron: '30 4 * * 1' # 每周一 04:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    if: github.repository == 'xpzouying/xiaohongshu-mcp'
    steps:
      - uses: actions/checkout@v4

      - uses: xpzouying/star-history@v1
        with:
          branch: star-history
          commit-message: 'chore: 更新 Star History 图表'
